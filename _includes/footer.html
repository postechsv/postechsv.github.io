<footer>
    <div class="footer">
        <div class="container footer-content">
            <div class="row footer-row">
                <div class="col-xs-12 col-md-3 footer-logo-col">
                    <img class="footer-logo" src="{{site.baseurl}}/images/logo/footer.png" alt="Logo" />
                </div>
                <div class="col-xs-12 col-md-9 footer-text-col">
                    {{ site.footer.name }}<br>
                    {{ site.footer.affiliation }}<br>
                    {{ site.footer.address1 }}, 
                    <span class="footer-address">{{ site.footer.address2 }}, </span>
                    <span class="footer-address">{{ site.footer.address3 }}</span><br>
                    COPYRIGHT {{ site.footer.copyright_year }} POSTECH. 
                    <span class="footer-copyright">All rights reserved.</span><br>
                    <span class="footer-spacer"></span>
                    <a href="{{ site.footer.privacy_policy_url }}"
                        class="footer-privacy-link">Personal Information Policy</a>
                    <span class="footer-spacer"></span>
                </div>
            </div>
        </div>
    </div>
</footer>
